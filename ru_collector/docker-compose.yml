version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ru_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ru_news
      API_TOKEN: ${API_TOKEN:-change-me-to-a-long-random-string}
      POLL_INTERVAL_MINUTES: ${POLL_INTERVAL_MINUTES:-15}
      API_HOST: "0.0.0.0"
      API_PORT: "8100"
    ports:
      - "8100:8100"
    restart: unless-stopped

volumes:
  pgdata:
